name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify VERSION matches tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$FILE" != "$TAG" ]; then
            echo "VERSION file ($FILE) does not match tag ($TAG)" >&2
            exit 1
          fi

      - name: Build release notes from tag message
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Annotated tag message from: release.sh --message "..."
          RAW="$(git tag -l --format='%(contents)' "$TAG")"
          RAW="$(printf '%s' "$RAW" | sed -e 's/[[:space:]]*$//')"
          # Prefer the user text after "— " (FlightScnr Pi VER — notes)
          USER_MSG="$(printf '%s\n' "$RAW" | head -n1 | sed -n 's/^FlightScnr Pi [^—]*—[[:space:]]*//p')"
          if [ -z "$USER_MSG" ]; then
            USER_MSG="$RAW"
          fi
          {
            echo "body<<EOF"
            if [ -n "$USER_MSG" ]; then
              printf '%s\n\n' "$USER_MSG"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlightScnr Pi ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          draft: false
          prerelease: false
